<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Agentic Assistant</title>
    <meta name="description" content="AI-powered Shopify store management assistant with an intuitive chat interface.">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <!-- ============ MAIN CHAT INTERFACE ============ -->
    <div id="app" class="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <span class="brand-icon">🛍️</span>
                    <div>
                        <div class="brand-title">Shopify Agent</div>
                        <div class="brand-sub">Agentic Assistant</div>
                    </div>
                </div>
                <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark/light mode">
                    <svg id="theme-icon-moon" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="theme-icon-sun" class="icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </div>

            <div class="sidebar-divider"></div>

            <button id="new-chat-btn" class="new-chat-btn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Chat
            </button>

            <div class="sidebar-section-label">Recent Chats</div>

            <div id="history-list" class="history-list">
                <!-- Populated by JS -->
            </div>

            <button id="delete-btn" class="delete-btn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                Delete Selected
            </button>

            <div class="sidebar-divider"></div>

            <div id="db-status" class="db-status">
                <span class="status-dot"></span>
                <span class="status-text">Checking...</span>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Top bar -->
            <header class="chat-header">
                <div class="chat-header-left">
                    <button id="sidebar-toggle" class="icon-btn sidebar-toggle-btn" title="Toggle sidebar">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="chat-title">Shopify Agentic Assistant</h1>
                </div>
            </header>

            <!-- Messages -->
            <div id="messages" class="messages">
                <div class="welcome-message">
                    <div class="welcome-icon">🛍️</div>
                    <h2>Shopify Agentic Assistant</h2>
                    <p>How can I help you manage your store today?</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <textarea id="message-input" class="message-input" placeholder="Send a message..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" title="Send message" disabled>
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <div class="input-footer">Shopify Agent can make mistakes. Verify important actions.</div>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
</body>
</html>
